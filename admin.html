<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#1f1b16" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="尋寶後台" />
<meta name="robots" content="noindex,nofollow" />
<link rel="icon" href="icons/icon-192.png" />
<title>尋寶獵人 後台</title>
<script src="vendor/tailwind.min.js"></script>
<script src="vendor/qrcode.min.js"></script>
<script src="vendor/html5-qrcode.min.js"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          treasure: {
            50: "#fff8e6", 100: "#ffeec0", 200: "#ffe096", 300: "#ffcc66",
            400: "#ffb14d", 500: "#f59e0b", 600: "#d97706", 700: "#b45309",
            800: "#92400e", 900: "#78350f"
          },
          ink: "#1f1b16"
        },
        animation: { 'pop': 'pop 0.4s ease-out' },
        keyframes: {
          pop: {
            "0%": { transform: "scale(0.5)", opacity: "0" },
            "70%": { transform: "scale(1.1)", opacity: "1" },
            "100%": { transform: "scale(1)" }
          }
        }
      }
    }
  };
</script>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: linear-gradient(180deg, #f3f4f6 0%, #e5e7eb 100%);
    background-attachment: fixed;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }
  .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,1); }
  .btn-treasure {
    background: linear-gradient(135deg, #ffb14d, #d97706);
    color: white; font-weight: 700; border-radius: 1rem;
    box-shadow: 0 10px 30px -8px rgba(245,158,11,.45);
    transition: all .2s;
  }
  .btn-treasure:hover { box-shadow: 0 12px 32px -8px rgba(245,158,11,.6); }
  .btn-treasure:active { transform: scale(0.97); }
  .btn-treasure:disabled { opacity: .5; cursor: not-allowed; }

  /* 列印用：每關 1 張 A4，含小標題 + N 個同樣 QR */
  .print-only { display: none; }
  @media print {
    @page { size: A4 portrait; margin: 10mm; }
    html, body { margin: 0 !important; padding: 0 !important; background: #fff !important; color: #000 !important; }
    body > *:not(.print-only) { display: none !important; }
    .print-only { display: block !important; }
    .print-page {
      width: 100% !important;
      box-sizing: border-box;
      margin: 0 !important;
      padding: 0 !important;
      page-break-after: always !important;
      page-break-inside: avoid !important;
      break-after: page;
      break-inside: avoid;
    }
    .print-page:last-child { page-break-after: auto !important; break-after: auto; }
    .print-header {
      text-align: center;
      font-size: 11pt;
      font-weight: bold;
      margin: 0 0 3mm !important;
      padding: 0 !important;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .print-grid {
      display: grid !important;
      margin: 0 !important;
      padding: 0 !important;
    }
    /* 行/列分開設 — 上下要明顯分隔 */
    .print-page.layout-6 .print-grid {
      grid-template-columns: repeat(2, 1fr) !important;
      column-gap: 4mm !important;
      row-gap: 6mm !important;
    }
    .print-page.layout-24 .print-grid {
      grid-template-columns: repeat(4, 1fr) !important;
      column-gap: 3mm !important;
      row-gap: 4mm !important;
    }
    .print-cell {
      display: flex !important;
      align-items: center;
      justify-content: center;
      margin: 0 !important;
      padding: 3mm !important;
      box-sizing: border-box !important;
      border: 0.5mm dashed #555 !important;   /* ← 加粗剪裁虛線（0.5mm 印出來明顯）*/
      border-radius: 1.5mm;
      print-color-adjust: exact !important;
      -webkit-print-color-adjust: exact !important;
    }
    /* QR 容器：固定 mm 尺寸（壓過 Tailwind preflight 對 canvas/img 的 max-width:100% / height:auto）*/
    .print-page.layout-6 .print-cell > div { width: 58mm !important; height: 58mm !important; }
    .print-page.layout-24 .print-cell > div { width: 26mm !important; height: 26mm !important; }
    .print-cell > div canvas,
    .print-cell > div img {
      width: 100% !important;
      height: 100% !important;
      max-width: none !important;
      max-height: none !important;
      display: block !important;
    }
  }
</style>
</head>
<body>

<header class="sticky top-0 z-30 bg-ink text-white shadow-md">
  <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
    <span class="font-black text-lg">🛠 尋寶獵人 後台</span>
    <span id="header-user" class="text-xs opacity-70"></span>
  </div>
</header>

<main id="main" class="max-w-2xl mx-auto p-4 pb-24"></main>

<!-- Scan Modal -->
<div id="scan-modal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl w-full max-w-md p-5 animate-pop">
    <div class="flex items-center justify-between mb-3">
      <h3 class="font-black text-lg text-treasure-900">📷 掃描 QR Code</h3>
      <button id="scan-close" class="text-gray-400 hover:text-gray-600 text-xl leading-none">✕</button>
    </div>
    <div id="scan-reader" class="rounded-xl overflow-hidden bg-black w-full" style="min-height: 280px;"></div>
    <p id="scan-hint" class="text-center text-xs text-gray-500 mt-3">請將 QR Code 對準鏡頭</p>
    <div class="mt-3">
      <select id="scan-camera-select" class="hidden w-full bg-white border-2 border-gray-200 rounded-xl px-3 py-2 text-sm"></select>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="hidden fixed left-1/2 -translate-x-1/2 bottom-8 bg-ink/90 text-white text-base font-semibold px-6 py-3.5 rounded-full shadow-2xl z-50 animate-pop max-w-[90%] text-center"></div>

<script>
//========== 後端 (Apps Script Web App) ==========
const API_URL = 'https://script.google.com/macros/s/AKfycbyeiwS5o8PKtQ3KYEwM7FZ3jOlYu7UTUFPLnmULHZHZr-qiPcUbkobLtHzdrqfospNxYA/exec';

// 玩家頁的 URL（站點 QR 用）
const PLAYER_URL = location.origin + location.pathname.replace(/admin\.html(\?.*)?$/, '');

async function callApi(action, payload = {}) {
  const body = { action, ...payload };
  const token = sessionStorage.getItem('admin_token');
  if (token) body.token = token;
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || data.message || '請求失敗');
  return data;
}

//========== 站點 QR（純列印用，名稱寫死）==========
const STATIONS = [
  { sid: 1, name: '運河碼頭登記簿' },
  { sid: 2, name: '中國城最後一家店的收據' },
  { sid: 3, name: '某人沒寄出的信' },
  { sid: 4, name: '地下街廣播員的手稿' },
  { sid: 5, name: '台南阿嬤的菜市仔袋' },
  { sid: 6, name: '夜奇鴨的羽毛' },
  { sid: 7, name: '時間膠囊' }
];

function generateStationQR(stationId) {
  return `${PLAYER_URL}?sid=${stationId}`;
}

//========== Admin Session ==========
function getAdminSession() {
  const raw = sessionStorage.getItem('admin_session');
  return raw ? JSON.parse(raw) : null;
}
function setAdminSession(role, name) {
  sessionStorage.setItem('admin_session', JSON.stringify({ role, name }));
}
function clearAdminSession() {
  sessionStorage.removeItem('admin_token');
  sessionStorage.removeItem('admin_session');
}

let adminTab = 'activation';

//========== Render ==========
function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  const session = getAdminSession();
  if (!session) {
    document.getElementById('header-user').innerText = '未登入';
    main.appendChild(renderAdminLogin());
    return;
  }
  document.getElementById('header-user').innerHTML = `${session.role === 'organizer' ? '👑' : '👨‍💼'} ${session.name} <button id="logout-admin" class="ml-2 underline opacity-80 hover:opacity-100">登出</button>`;
  document.getElementById('logout-admin').onclick = () => { clearAdminSession(); render(); };

  const wrap = document.createElement('div');
  wrap.className = 'space-y-4';

  // Tabs
  const tabsBar = document.createElement('div');
  tabsBar.className = 'glass rounded-2xl p-1.5 flex gap-1 text-sm overflow-x-auto';
  const tabs = [
    ['activation', '🎫 啟動'],
    ['lottery100', '🎁 $100抽獎'],
    ['verify',     '✅ 領獎驗證'],
  ];
  if (session.role === 'organizer') tabs.push(['draw200', '🎲 抽大獎']);
  tabs.push(['stations', '📷 站點QR']);
  tabs.push(['stats',    '📊 統計']);

  tabs.forEach(([t, label]) => {
    const active = adminTab === t;
    const b = document.createElement('button');
    b.className = `flex-1 px-3 py-2 rounded-xl font-bold whitespace-nowrap transition ${active ? 'bg-ink text-white' : 'text-treasure-800 hover:bg-treasure-50'}`;
    b.innerText = label;
    b.onclick = () => { adminTab = t; render(); };
    tabsBar.appendChild(b);
  });
  wrap.appendChild(tabsBar);

  if (adminTab === 'activation')      wrap.appendChild(renderAdminActivation(session));
  else if (adminTab === 'lottery100') wrap.appendChild(renderAdminLottery100(session));
  else if (adminTab === 'verify')     wrap.appendChild(renderAdminVerify(session));
  else if (adminTab === 'draw200')    wrap.appendChild(renderAdminDraw200(session));
  else if (adminTab === 'stations')   wrap.appendChild(renderAdminStations(session));
  else if (adminTab === 'stats')      wrap.appendChild(renderAdminStats());
  else { adminTab = 'activation'; wrap.appendChild(renderAdminActivation(session)); }

  main.appendChild(wrap);
}

function renderAdminLogin() {
  const wrap = document.createElement('div');
  wrap.className = 'space-y-4';
  wrap.innerHTML = `
    <div class="text-center pt-8">
      <div class="text-6xl mb-3">🛠</div>
      <h1 class="text-2xl font-black text-treasure-900">後台登入</h1>
      <p class="text-xs text-gray-500 mt-1">服務員 / 主辦方專用</p>
    </div>
    <div class="glass rounded-3xl p-6 shadow space-y-3">
      <div>
        <label class="block text-xs font-bold mb-1 text-gray-700">帳號</label>
        <input id="admin-u" placeholder="如 admin / s01" autocomplete="username"
          class="w-full bg-white border-2 border-gray-200 rounded-xl px-3 py-3 focus:outline-none focus:border-treasure-400" />
      </div>
      <div>
        <label class="block text-xs font-bold mb-1 text-gray-700">密碼</label>
        <input id="admin-p" type="password" placeholder="••••••••" autocomplete="current-password"
          class="w-full bg-white border-2 border-gray-200 rounded-xl px-3 py-3 focus:outline-none focus:border-treasure-400" />
      </div>
      <button id="admin-login-btn" class="btn-treasure w-full py-3.5">登入</button>
      <p id="admin-login-err" class="hidden text-xs text-red-600 text-center bg-red-50 rounded-xl py-2"></p>
    </div>
    <p class="text-center text-[11px] text-gray-400">本頁僅工作人員可進入；玩家請至 <a href="./" class="underline">玩家頁</a></p>
  `;
  setTimeout(() => {
    const submit = async () => {
      const username = wrap.querySelector('#admin-u').value.trim();
      const password = wrap.querySelector('#admin-p').value;
      const err = wrap.querySelector('#admin-login-err');
      err.classList.add('hidden');
      if (!username || !password) { err.innerText = '請輸入帳號與密碼'; err.classList.remove('hidden'); return; }
      const btn = wrap.querySelector('#admin-login-btn');
      btn.disabled = true; btn.innerText = '登入中…';
      try {
        const res = await callApi('login', { username, password });
        sessionStorage.setItem('admin_token', res.token);
        setAdminSession(res.role, res.name);
        render();
      } catch (e) {
        err.innerText = '❌ ' + e.message;
        err.classList.remove('hidden');
        btn.disabled = false; btn.innerText = '登入';
      }
    };
    wrap.querySelector('#admin-login-btn').onclick = submit;
    wrap.querySelector('#admin-p').addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  }, 0);
  return wrap;
}

//========== 共用：QR 解析 ==========
function parseScannedQR(raw) {
  raw = String(raw || '').trim();
  if (!raw) return null;
  try {
    const obj = JSON.parse(raw);
    if (obj && obj.uid) return obj;
  } catch (e) {}
  if (/^U-/.test(raw)) return { uid: raw };
  return null;
}

//========== 啟動 ==========
function renderAdminActivation(session) {
  const wrap = document.createElement('div');
  wrap.className = 'glass rounded-3xl p-5 shadow space-y-4';
  wrap.innerHTML = `
    <div>
      <h2 class="text-xl font-black text-treasure-900">🎫 啟動客人</h2>
      <p class="text-sm text-gray-600 mt-1">收費後掃客人手機 QR → 確認姓名與卡別</p>
    </div>
    <div class="flex gap-2">
      <input id="act-uid" placeholder="UID（可手動輸入或掃描）"
        class="flex-1 min-w-0 bg-white border-2 border-gray-200 rounded-xl px-3 py-2 font-mono text-xs focus:outline-none focus:border-treasure-400" />
      <button id="act-scan" type="button"
        class="shrink-0 bg-treasure-50 hover:bg-treasure-100 border-2 border-treasure-200 text-treasure-800 rounded-xl px-3 py-2 text-sm font-bold">📷</button>
    </div>
    <input id="act-name" placeholder="客人姓名"
      class="w-full bg-white border-2 border-gray-200 rounded-xl px-3 py-2 focus:outline-none focus:border-treasure-400" />
    <div class="grid grid-cols-2 gap-3">
      <button id="act-100" class="bg-gradient-to-br from-gray-600 to-gray-800 text-white rounded-2xl py-4 font-bold">$100 啟動</button>
      <button id="act-200" class="bg-gradient-to-br from-yellow-400 to-amber-500 text-black rounded-2xl py-4 font-bold">$200 啟動</button>
    </div>
    <p id="act-result" class="hidden text-sm text-center font-bold"></p>
  `;
  setTimeout(() => {
    const uidInput = wrap.querySelector('#act-uid');
    const nameInput = wrap.querySelector('#act-name');
    const result = wrap.querySelector('#act-result');

    wrap.querySelector('#act-scan').onclick = () => openScanner((text) => {
      const parsed = parseScannedQR(text);
      if (!parsed) {
        // 顯示真實掃到的內容前 50 字，方便除錯
        const preview = String(text || '').slice(0, 50).replace(/[\r\n]/g, ' ');
        showToast(`❌ QR 解析失敗：${preview}`);
        console.warn('Scan failed, raw text:', text);
        return;
      }
      uidInput.value = parsed.uid;
      if (parsed.n) {
        nameInput.value = parsed.n;
        showToast(`✅ 已帶入：${parsed.n}（請選卡別）`);
      } else {
        nameInput.focus();
        showToast(`✅ UID 已帶入：${parsed.uid.slice(-8)}（請填名字 + 選卡別）`);
      }
    });

    const activate = async (tier) => {
      const uid = uidInput.value.trim();
      const name = nameInput.value.trim();
      if (!uid) return showToast('請輸入或掃描 UID');
      if (!name) return showToast('請輸入客人姓名');
      result.classList.add('hidden');
      try {
        const res = await callApi('activate', { uid, name, tier });
        result.innerText = '✅ ' + res.message;
        result.className = 'text-sm text-center font-bold text-green-700 bg-green-50 rounded-xl py-2';
        result.classList.remove('hidden');
        uidInput.value = ''; nameInput.value = '';
        wrap.querySelectorAll('[id^=act-1],[id^=act-2]').forEach(b => b.classList.remove('ring-4', 'ring-treasure-300'));
      } catch (e) {
        result.innerText = '❌ ' + e.message;
        result.className = 'text-sm text-center font-bold text-red-700 bg-red-50 rounded-xl py-2';
        result.classList.remove('hidden');
      }
    };
    wrap.querySelector('#act-100').onclick = () => activate('100');
    wrap.querySelector('#act-200').onclick = () => activate('200');
  }, 0);
  return wrap;
}

//========== $100 即時抽獎 ==========
function renderAdminLottery100(session) {
  const wrap = document.createElement('div');
  wrap.className = 'glass rounded-3xl p-5 shadow space-y-4';
  wrap.innerHTML = `
    <div>
      <h2 class="text-xl font-black text-treasure-900">🎁 $100 即時抽獎</h2>
      <p class="text-sm text-gray-600 mt-1">掃描客人領獎 QR → 系統檢查資格 → 標記已抽</p>
    </div>
    <div class="flex gap-2">
      <input id="l100-uid" placeholder="貼上 QR 內容或 UID"
        class="flex-1 min-w-0 bg-white border-2 border-gray-200 rounded-xl px-3 py-2 font-mono text-xs focus:outline-none focus:border-treasure-400" />
      <button id="l100-scan" type="button"
        class="shrink-0 bg-treasure-50 hover:bg-treasure-100 border-2 border-treasure-200 text-treasure-800 rounded-xl px-3 py-2 text-sm font-bold">📷</button>
    </div>
    <button id="l100-go" class="btn-treasure w-full py-3.5">確認可抽獎</button>
    <div id="l100-result"></div>
  `;
  setTimeout(() => {
    const inp = wrap.querySelector('#l100-uid');
    const result = wrap.querySelector('#l100-result');

    const submit = async () => {
      const parsed = parseScannedQR(inp.value);
      if (!parsed) return showToast('請輸入或掃描有效 QR');
      result.innerHTML = '<p class="text-center text-sm text-gray-500">查詢中…</p>';
      try {
        const res = await callApi('lottery100', { uid: parsed.uid, points: parsed.p || 0 });
        if (res.ok) {
          result.innerHTML = `
            <div class="bg-green-50 border-2 border-green-400 rounded-2xl p-5 text-center shadow">
              <p class="text-5xl mb-2">🎁</p>
              <p class="font-black text-green-700 text-xl">${res.name}</p>
              <p class="text-sm text-green-600 mt-1">$${res.tier.replace('$','')} 卡 · 完成 ${res.points} 關</p>
              <p class="text-base font-bold text-green-800 mt-3">→ 請現場抽獎並發獎</p>
              <p class="text-[10px] text-gray-400 mt-2">已標記抽獎時間，無法重抽</p>
            </div>
          `;
          inp.value = '';
        }
      } catch (e) {
        result.innerHTML = `
          <div class="bg-red-50 border-2 border-red-400 rounded-2xl p-5 text-center shadow">
            <p class="text-5xl mb-2">❌</p>
            <p class="font-black text-red-700">${e.message}</p>
            <p class="text-xs text-red-500 mt-2">→ 不發獎</p>
          </div>
        `;
      }
    };
    wrap.querySelector('#l100-go').onclick = submit;
    wrap.querySelector('#l100-scan').onclick = () => openScanner((text) => { inp.value = text; submit(); });
  }, 0);
  return wrap;
}

//========== 領獎驗證 ==========
function renderAdminVerify(session) {
  const wrap = document.createElement('div');
  wrap.className = 'glass rounded-3xl p-5 shadow space-y-4';
  wrap.innerHTML = `
    <div>
      <h2 class="text-xl font-black text-treasure-900">✅ 領獎驗證</h2>
      <p class="text-sm text-gray-600 mt-1">掃客人領獎 QR → 顯示應發獎品（可寫備註）</p>
    </div>
    <div class="flex gap-2">
      <input id="vfy-uid" placeholder="貼上 QR 內容或 UID"
        class="flex-1 min-w-0 bg-white border-2 border-gray-200 rounded-xl px-3 py-2 font-mono text-xs focus:outline-none focus:border-treasure-400" />
      <button id="vfy-scan" type="button"
        class="shrink-0 bg-treasure-50 hover:bg-treasure-100 border-2 border-treasure-200 text-treasure-800 rounded-xl px-3 py-2 text-sm font-bold">📷</button>
    </div>
    <button id="vfy-go" class="btn-treasure w-full py-3.5">查詢</button>
    <div id="vfy-result"></div>
  `;
  setTimeout(() => {
    const inp = wrap.querySelector('#vfy-uid');
    const result = wrap.querySelector('#vfy-result');

    const submit = async () => {
      const parsed = parseScannedQR(inp.value);
      if (!parsed) return showToast('請輸入或掃描有效 QR');
      result.innerHTML = '<p class="text-center text-sm text-gray-500">查詢中…</p>';
      try {
        const res = await callApi('claim', { uid: parsed.uid, points: parsed.p || 0 });
        const e = res.eligibility;
        const tierNum = res.tier.replace('$','');
        const items = [];
        if (e.basic) items.push('🎁 基礎獎品');
        if (e.lottery100) items.push('💰 $100 抽獎資格');
        if (e.grandPool) items.push('🧳 已入大獎池（等候抽籤）');
        if (res.alreadyWon) items.push(`🏆 ${res.wonRound} 中過大獎`);

        result.innerHTML = `
          <div class="bg-white border-2 border-green-400 rounded-2xl p-5 shadow space-y-3">
            <div class="bg-green-50 -m-5 mb-0 p-3 rounded-t-xl text-center">
              <p class="font-bold text-green-700 text-sm">✅ 身分有效</p>
            </div>
            <div class="flex items-center gap-4 pt-2">
              <div class="w-16 h-16 rounded-full bg-treasure-100 flex items-center justify-center text-3xl ring-4 ring-green-200">👤</div>
              <div class="flex-1 min-w-0">
                <p class="text-2xl font-black text-treasure-900 truncate">${res.name}</p>
                <p class="text-xs"><span class="${tierNum==='200'?'bg-yellow-300':'bg-gray-300'} px-2 py-0.5 rounded-full font-bold">$${tierNum} 卡</span> · ${res.points}/7 關</p>
                <p class="font-mono text-[10px] text-gray-400 truncate mt-1">${parsed.uid}</p>
              </div>
            </div>
            <div class="border-t pt-2">
              <p class="text-xs font-bold mb-2">應發獎項：</p>
              ${items.length ? items.map(t => `<div class="bg-yellow-50 border border-yellow-300 rounded-xl px-3 py-2 text-sm font-semibold mb-1.5">${t}</div>`).join('') :
                '<div class="text-sm text-gray-500 text-center py-2">尚未達領獎門檻（< 3 關）</div>'}
            </div>
            <button id="vfy-note" class="w-full bg-treasure-50 hover:bg-treasure-100 text-treasure-800 rounded-xl py-2 text-sm font-bold">✍️ 寫備註（如：基礎獎已領）</button>
          </div>
        `;
        wrap.querySelector('#vfy-note').onclick = async () => {
          const note = prompt('輸入備註（會寫入 Sheet K 欄）：');
          if (note == null) return;
          try { await callApi('note', { uid: parsed.uid, note }); showToast('✅ 備註已存'); }
          catch (er) { showToast('❌ ' + er.message); }
        };
      } catch (e) {
        result.innerHTML = `
          <div class="bg-red-50 border-2 border-red-400 rounded-2xl p-5 text-center shadow">
            <p class="text-5xl mb-2">❌</p>
            <p class="font-black text-red-700">${e.message}</p>
            <p class="text-xs text-red-500 mt-2">→ 不發獎</p>
          </div>
        `;
      }
    };
    wrap.querySelector('#vfy-go').onclick = submit;
    wrap.querySelector('#vfy-scan').onclick = () => openScanner((text) => { inp.value = text; submit(); });
  }, 0);
  return wrap;
}

//========== 站點 QR（離線設定，只供工作人員列印） ==========
function renderAdminStations(session) {
  const wrap = document.createElement('div');
  wrap.className = 'space-y-3';
  wrap.innerHTML = `
    <div class="bg-blue-50 border border-blue-200 rounded-xl p-3 text-xs text-blue-900">
      ℹ️ 關卡 QR 已寫死、永不變動。可選兩種列印密度：<strong>6 張/頁（大尺寸 75mm）</strong>或 <strong>24 張/頁（小尺寸 38mm）</strong>。每關 1 張 A4，共 7 張。<br>
      要修改關卡名稱請改 <code class="bg-white px-1 rounded">index.html</code> 程式碼裡的 <code class="bg-white px-1 rounded">STATIONS</code> 後重新部署。<br>
      📌 玩家網址：<span class="font-mono break-all">${PLAYER_URL}</span>
    </div>
    <div class="flex items-center justify-between flex-wrap gap-2">
      <h2 class="text-xl font-black text-treasure-900">📷 關卡 QR Code（${STATIONS.length} 關）</h2>
      <div class="flex gap-2">
        <button id="print-6" class="bg-ink text-white rounded-xl px-3 py-2 text-xs font-bold">🖨 列印 6 張/頁（大）</button>
        <button id="print-24" class="bg-ink text-white rounded-xl px-3 py-2 text-xs font-bold">🖨 列印 24 張/頁（小）</button>
      </div>
    </div>
  `;
  STATIONS.forEach(s => wrap.appendChild(renderStationCard(s)));

  // ─── 建立列印容器 ─────────
  function buildPrintLayout(copiesPerPage) {
    const old = document.querySelector('.print-only');
    if (old) old.remove();
    const printRoot = document.createElement('div');
    printRoot.className = 'print-only';
    STATIONS.forEach(station => {
      const page = document.createElement('div');
      page.className = `print-page layout-${copiesPerPage}`;

      const header = document.createElement('div');
      header.className = 'print-header';
      header.innerText = `第 ${station.sid} 關 · ${station.name}`;
      page.appendChild(header);

      const grid = document.createElement('div');
      grid.className = 'print-grid';
      for (let i = 0; i < copiesPerPage; i++) {
        const cell = document.createElement('div');
        cell.className = 'print-cell';
        const qrDiv = document.createElement('div');
        cell.appendChild(qrDiv);
        setTimeout(() => {
          new QRCode(qrDiv, {
            text: generateStationQR(station.sid),
            width: 320, height: 320,
            correctLevel: QRCode.CorrectLevel.M
          });
        }, 0);
        grid.appendChild(cell);
      }
      page.appendChild(grid);
      printRoot.appendChild(page);
    });
    document.body.appendChild(printRoot);
  }

  setTimeout(() => {
    wrap.querySelector('#print-6').onclick = () => {
      buildPrintLayout(6);
      setTimeout(() => window.print(), 500);
    };
    wrap.querySelector('#print-24').onclick = () => {
      buildPrintLayout(24);
      setTimeout(() => window.print(), 500);
    };
  }, 0);
  return wrap;
}

function renderStationCard(s) {
  const url = generateStationQR(s.sid);
  const card = document.createElement('div');
  card.className = 'glass rounded-3xl p-4 shadow';
  card.innerHTML = `
    <div class="flex items-center gap-4">
      <div class="text-center shrink-0">
        <div class="qr-canvas mx-auto bg-white rounded-xl p-1 inline-block"></div>
      </div>
      <div class="flex-1 min-w-0 space-y-1">
        <p class="text-[11px] bg-treasure-50 inline-block px-2.5 py-0.5 rounded-full font-bold text-treasure-700">#${s.sid}</p>
        <p class="text-lg font-black text-treasure-900 break-words">${s.name}</p>
        <p class="text-[10px] font-mono text-gray-400 break-all">${url}</p>
      </div>
    </div>
  `;
  setTimeout(() => {
    const el = card.querySelector('.qr-canvas');
    el.innerHTML = '';
    new QRCode(el, { text: url, width: 140, height: 140, correctLevel: QRCode.CorrectLevel.M });
  }, 0);
  return card;
}

//========== Toast ==========
function showToast(msg) {
  const el = document.getElementById('toast');
  el.innerText = msg;
  el.classList.remove('hidden');
  clearTimeout(window._toastT);
  window._toastT = setTimeout(() => el.classList.add('hidden'), 2500);
}

//========== QR Camera Scanner ==========
let _scanner = null;
let _scanCameras = [];
let _scanOnResult = null;

async function startScanWithCam(camId) {
  const hint = document.getElementById('scan-hint');
  if (_scanner) {
    try { await _scanner.stop(); _scanner.clear(); } catch (e) {}
    _scanner = null;
  }
  _scanner = new Html5Qrcode('scan-reader');
  hint.innerText = '正在啟動相機…';
  try {
    await _scanner.start(
      camId,
      { fps: 10, qrbox: { width: 240, height: 240 } },
      (decoded) => {
        const cb = _scanOnResult;
        closeScanner();
        if (cb) cb(decoded);
      },
      () => {}
    );
    hint.innerText = '請將 QR Code 對準鏡頭';
  } catch (e) {
    hint.innerText = '❌ 無法啟動相機：' + (e.message || e);
  }
}

async function openScanner(onResult) {
  if (typeof Html5Qrcode === 'undefined') { showToast('掃描函式庫未載入'); return; }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showToast('瀏覽器不支援相機（請用 HTTPS 或 localhost）'); return;
  }
  _scanOnResult = onResult;
  const modal = document.getElementById('scan-modal');
  const select = document.getElementById('scan-camera-select');
  const hint = document.getElementById('scan-hint');
  modal.classList.remove('hidden');
  hint.innerText = '正在請求相機權限…';

  try {
    _scanCameras = await Html5Qrcode.getCameras();
    if (!_scanCameras || _scanCameras.length === 0) {
      hint.innerText = '❌ 找不到任何相機'; return;
    }
    const back = _scanCameras.find(c => /back|rear|environment|後/i.test(c.label || ''));
    const initial = back || _scanCameras[_scanCameras.length - 1];
    if (_scanCameras.length > 1) {
      select.innerHTML = _scanCameras.map(c =>
        `<option value="${c.id}" ${c.id === initial.id ? 'selected' : ''}>${c.label || ('相機 ' + c.id.slice(0, 6))}</option>`
      ).join('');
      select.classList.remove('hidden');
      select.onchange = () => startScanWithCam(select.value);
    } else {
      select.classList.add('hidden');
    }
    await startScanWithCam(initial.id);
  } catch (e) {
    hint.innerText = '❌ 無法存取相機：' + (e.message || e);
  }
}

async function closeScanner() {
  const modal = document.getElementById('scan-modal');
  modal.classList.add('hidden');
  _scanOnResult = null;
  if (_scanner) {
    try { await _scanner.stop(); _scanner.clear(); } catch (e) {}
    _scanner = null;
  }
}

document.getElementById('scan-close').onclick = closeScanner;
document.getElementById('scan-modal').addEventListener('click', (e) => {
  if (e.target.id === 'scan-modal') closeScanner();
});

//========== Init ==========
render();
</script>
