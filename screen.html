<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>尋寶獵人 — 大螢幕</title>
<script src="vendor/tailwind.min.js"></script>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: linear-gradient(135deg, #78350f 0%, #d97706 50%, #fbbf24 100%);
    min-height: 100vh;
    color: white;
    overflow-y: auto; /* 允許滾動，視窗太小時不卡 */
  }
  /* 縮小視窗時自動縮 padding 與字級，避免內容溢出又看不到下面 */
  @media (max-height: 900px) {
    body { padding: 1.5rem !important; }
    .stats-card-value { font-size: 2.25rem !important; }
    #event-title { font-size: 2.5rem !important; }
    .gem-emoji { font-size: 6rem !important; }
    .glow-text { font-size: 2rem !important; }
  }
  @media (max-height: 700px) {
    body { padding: 1rem !important; }
    .gem-emoji { font-size: 4.5rem !important; }
    .glow-text { font-size: 1.5rem !important; }
  }
  @keyframes float { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-12px) } }
  @keyframes sparkle { 0%,100% { transform: scale(1) rotate(0deg); opacity: .7 } 50% { transform: scale(1.3) rotate(20deg); opacity: 1 } }
  @keyframes slideIn { from { transform: translateX(-100px); opacity: 0 } to { transform: translateX(0); opacity: 1 } }
  @keyframes scrollX {
    0% { transform: translateX(0%) }
    100% { transform: translateX(-50%) }
  }
  @keyframes glow {
    0%, 100% { text-shadow: 0 0 20px rgba(255,255,255,.4), 0 0 40px rgba(252,211,77,.3); }
    50% { text-shadow: 0 0 30px rgba(255,255,255,.8), 0 0 60px rgba(252,211,77,.9); }
  }
  @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes fade-cycle {
    0%, 30% { opacity: 1; transform: translateY(0); }
    35%, 95% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 0; transform: translateY(-10px); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .float { animation: float 3s ease-in-out infinite; }
  .sparkle { animation: sparkle 2s ease-in-out infinite; }
  .winner-row { animation: slideIn 0.6s cubic-bezier(.34, 1.56, .64, 1) backwards; }
  .ticker-track { animation: scrollX 30s linear infinite; }
  .glow-text { animation: glow 2.5s ease-in-out infinite; }
  .spin-slow { animation: spin-slow 20s linear infinite; }
  .shimmer {
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.4) 50%, transparent 100%);
    background-size: 200% 100%;
    animation: shimmer 3s ease-in-out infinite;
  }

  /* ━━━ 開獎儀式動畫 ━━━ */
  @keyframes fade-in-bg { from { opacity: 0; } to { opacity: 1; } }
  @keyframes title-pop {
    0% { transform: scale(0) rotate(-15deg); opacity: 0; }
    50% { transform: scale(1.15) rotate(3deg); opacity: 1; }
    70% { transform: scale(0.95) rotate(-2deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes count-pop {
    0% { transform: scale(0.2); opacity: 0; filter: blur(20px); }
    25% { transform: scale(1.4); opacity: 1; filter: blur(0); }
    75% { transform: scale(1); opacity: 1; }
    100% { transform: scale(2); opacity: 0; }
  }
  @keyframes finale-burst {
    0% { transform: scale(0) rotate(-30deg); opacity: 0; }
    30% { transform: scale(1.6) rotate(5deg); opacity: 1; filter: drop-shadow(0 0 60px gold) brightness(1.8); }
    60% { transform: scale(0.9) rotate(-2deg); filter: drop-shadow(0 0 30px gold); }
    100% { transform: scale(1.1) rotate(0deg); opacity: 1; filter: drop-shadow(0 0 40px gold); }
  }
  @keyframes confetti-fall {
    0% { transform: translateY(-100vh) rotate(0); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  @keyframes pulse-scale {
    0%, 100% { transform: scale(1) rotate(-10deg); }
    25% { transform: scale(1.15) rotate(0deg); }
    50% { transform: scale(1) rotate(10deg); }
    75% { transform: scale(1.15) rotate(0deg); }
  }
  .pulse-scale { animation: pulse-scale 0.5s ease-in-out infinite; }
  .anim-title-pop  { animation: title-pop 0.6s cubic-bezier(.34,1.56,.64,1) both; }
  .anim-count-pop  { animation: count-pop 0.9s ease-out both; }
  .anim-finale     { animation: finale-burst 0.8s cubic-bezier(.34,1.56,.64,1) both; }
  .anim-fade-bg    { animation: fade-in-bg 0.5s ease both; }
  .confetti {
    position: absolute;
    font-size: 2rem;
    animation: confetti-fall linear forwards;
    pointer-events: none;
  }
</style>
</head>
<body class="p-8">

<div class="max-w-6xl mx-auto">
  <!-- Header -->
  <div class="text-center mb-5">
    <div class="text-6xl mb-1 float inline-block">🏴‍☠️</div>
    <h1 id="event-title" class="text-4xl font-black drop-shadow-lg">尋寶獵人</h1>
    <p class="text-base mt-1 opacity-90">Treasure Hunt — 即時抽獎大螢幕</p>
  </div>

  <!-- Stats row -->
  <div id="stats" class="grid grid-cols-4 gap-3 mb-4"></div>

  <!-- Latest grand prize draw winners -->
  <div class="bg-white/15 backdrop-blur-md rounded-3xl p-6 shadow-2xl border-2 border-white/30 overflow-hidden relative">
    <div class="flex items-center justify-between mb-5">
      <div>
        <p class="text-sm opacity-80 uppercase tracking-widest">🏆 大獎中獎名單</p>
        <h2 id="round-title" class="text-3xl font-black mt-1">等候開獎…</h2>
      </div>
      <div id="round-time" class="text-right text-sm opacity-80"></div>
    </div>
    <div id="winners" class="space-y-2.5"></div>
  </div>

  <div class="mt-4 text-center text-xs opacity-70 space-y-1">
    <p>本頁每 10 秒自動刷新 · 最近一次：<span id="updated-at">…</span></p>
    <p class="opacity-50">按 <kbd class="px-1.5 py-0.5 bg-white/20 rounded text-[10px]">T</kbd> 預演開獎動畫</p>
  </div>
</div>

<!-- ━━━ 開獎儀式 Overlay（~16 秒，台灣彩券風）━━━ -->
<div id="ceremony" class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center backdrop-blur-lg" style="background: radial-gradient(ellipse at center, rgba(120,53,15,0.95) 0%, rgba(0,0,0,0.98) 100%);">
  <div id="ceremony-confetti" class="absolute inset-0 pointer-events-none overflow-hidden"></div>
  <div class="relative z-10 text-center">
    <!-- Phase 1: 標題 -->
    <div id="ceremony-title" class="hidden">
      <div class="text-7xl mb-4">🎊 🏆 🎊</div>
      <div class="text-6xl font-black drop-shadow-2xl bg-gradient-to-r from-yellow-200 via-yellow-400 to-orange-400 bg-clip-text text-transparent">大獎即將揭曉</div>
      <p class="text-2xl mt-6 opacity-90">請屏息以待…</p>
    </div>
    <!-- Phase 2: 鼓聲鋪墊 -->
    <div id="ceremony-drumroll" class="hidden">
      <div class="text-8xl mb-4 inline-block pulse-scale">🎲</div>
      <div id="ceremony-drumroll-text" class="text-4xl font-black drop-shadow-2xl text-yellow-100">命運即將揭曉</div>
      <p class="text-xl mt-4 opacity-80 italic">所有人請就位…</p>
    </div>
    <!-- Phase 3: 倒數 -->
    <div id="ceremony-countdown" class="hidden font-black drop-shadow-2xl text-yellow-200" style="font-size:20rem; line-height:1;"></div>
    <!-- Phase 4: 揭曉 -->
    <div id="ceremony-finale" class="hidden">
      <div class="text-9xl mb-4">🎉 ✨ 🏆 ✨ 🎉</div>
      <div class="text-7xl font-black drop-shadow-2xl bg-gradient-to-r from-yellow-200 via-yellow-400 to-orange-400 bg-clip-text text-transparent">揭 曉！</div>
      <p class="text-2xl mt-6 opacity-95">恭喜中獎者！</p>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyeiwS5o8PKtQ3KYEwM7FZ3jOlYu7UTUFPLnmULHZHZr-qiPcUbkobLtHzdrqfospNxYA/exec';

// 大螢幕只讀取統計與抽獎結果，不需要登入
async function call(action, payload = {}) {
  const res = await fetch(API_URL, {
    method: 'POST', headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action, ...payload })
  });
  return res.json();
}

function maskName(name) {
  // 隱碼：王*、王小*
  if (!name) return '?';
  const len = [...name].length;
  if (len <= 1) return name;
  if (len === 2) return name[0] + '*';
  const arr = [...name];
  return arr[0] + arr[1] + '*'.repeat(Math.max(1, len - 2));
}

// 等候畫面的隨機標語（每次刷新換一個）
const TAGLINES = [
  '🏴‍☠️ 海盜寶藏，誰人會中？',
  '🧳 大獎行李箱，正在打包中…',
  '✨ $200 卡，完成 7 關，名額有限',
  '💎 你已經在池內了嗎？',
  '🎲 命運的輪盤，蓄勢待發',
  '🗺️ 七關都解開了？來碰碰運氣！',
  '🍀 機會均等，幸運不打折',
  '⭐ 下一位中獎者，會是您嗎？'
];
let lastWinnerCount = 0;
let taglineIndex = Math.floor(Math.random() * TAGLINES.length);
let lastSeenRoundKey = '';   // 最後一次看到的抽獎輪次
let lastSeenRoundCount = 0;  // 最後一次看到的總輪次數（雙保險偵測「新一輪」）
let isCeremonyRunning = false;

// 鍵盤快捷鍵：T = 預演開獎動畫
document.addEventListener('keydown', (e) => {
  if (isCeremonyRunning) return;
  if (e.key === 't' || e.key === 'T') playCeremony();
});

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function spawnConfetti(container, count) {
  const emojis = ['🎉', '🎊', '✨', '⭐', '💎', '🏆'];
  for (let i = 0; i < count; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.innerText = emojis[Math.floor(Math.random() * emojis.length)];
    c.style.left = (Math.random() * 100) + '%';
    c.style.fontSize = (1.5 + Math.random() * 2) + 'rem';
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = (Math.random() * 0.5) + 's';
    container.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

const DRUMROLL_TEXTS = ['命運即將揭曉', '幸運之星，照耀誰？', '海盜寶藏即將易主', '萬眾矚目時刻'];

async function playCeremony() {
  isCeremonyRunning = true;
  const overlay = document.getElementById('ceremony');
  const title = document.getElementById('ceremony-title');
  const drumroll = document.getElementById('ceremony-drumroll');
  const drumrollText = document.getElementById('ceremony-drumroll-text');
  const countdown = document.getElementById('ceremony-countdown');
  const finale = document.getElementById('ceremony-finale');
  const confettiBox = document.getElementById('ceremony-confetti');

  // 全部先隱藏
  [title, drumroll, countdown, finale].forEach(el => el.classList.add('hidden'));

  // 顯示遮罩
  overlay.classList.remove('hidden');
  overlay.classList.add('anim-fade-bg');
  await wait(300);

  // ─── Phase 1：標題出場（2.5 秒）───
  title.classList.remove('hidden');
  title.classList.add('anim-title-pop');
  await wait(2500);
  title.classList.add('hidden');
  title.classList.remove('anim-title-pop');

  // ─── Phase 2：鼓聲鋪墊（2.5 秒，文字輪播）───
  drumroll.classList.remove('hidden');
  for (let i = 0; i < DRUMROLL_TEXTS.length; i++) {
    drumrollText.style.opacity = '0';
    await wait(150);
    drumrollText.innerText = DRUMROLL_TEXTS[i];
    drumrollText.style.opacity = '1';
    await wait(550);
  }
  drumroll.classList.add('hidden');

  // ─── Phase 3：倒數 5,4,3,2,1（每數 1.5 秒，共 7.5 秒）───
  countdown.classList.remove('hidden');
  for (let n = 5; n >= 1; n--) {
    countdown.classList.remove('anim-count-pop');
    void countdown.offsetWidth; // reflow 強制 restart 動畫
    countdown.innerText = n;
    countdown.classList.add('anim-count-pop');
    countdown.style.animationDuration = '1.5s';
    await wait(1500);
  }
  countdown.classList.add('hidden');
  countdown.style.animationDuration = '';

  // ─── Phase 4：揭曉爆裂 + 彩帶（3 秒）───
  finale.classList.remove('hidden');
  finale.classList.add('anim-finale');
  spawnConfetti(confettiBox, 80);
  // 持續灑彩帶 2 秒
  setTimeout(() => spawnConfetti(confettiBox, 40), 800);
  setTimeout(() => spawnConfetti(confettiBox, 40), 1600);
  await wait(3000);
  finale.classList.add('hidden');
  finale.classList.remove('anim-finale');

  // 收尾：遮罩淡出（0.5 秒）
  overlay.style.transition = 'opacity 0.5s';
  overlay.style.opacity = '0';
  await wait(500);
  overlay.classList.add('hidden');
  overlay.classList.remove('anim-fade-bg');
  overlay.style.opacity = '';
  overlay.style.transition = '';

  isCeremonyRunning = false;
}

//========== 已演過的輪次（localStorage 持久化，避免刷新重播）==========
const SHOWN_CEREMONY_KEY = 'shown_ceremony_rounds';
function ceremonyAlreadyShown(roundKey) {
  try {
    const raw = localStorage.getItem(SHOWN_CEREMONY_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return arr.includes(roundKey);
  } catch (e) { return false; }
}
function markCeremonyShown(roundKey) {
  try {
    const raw = localStorage.getItem(SHOWN_CEREMONY_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    if (!arr.includes(roundKey)) arr.push(roundKey);
    if (arr.length > 20) arr.splice(0, arr.length - 20);
    localStorage.setItem(SHOWN_CEREMONY_KEY, JSON.stringify(arr));
  } catch (e) {}
}

async function refresh() {
  if (isCeremonyRunning) return; // 儀式進行中暫停刷新
  try {
    const stats = await call('stats');
    let poolCount = 0;
    if (stats.ok) {
      if (stats.eventName) document.getElementById('event-title').innerText = stats.eventName;
      poolCount = Math.max(0, Number(stats.completed7 || 0) - Number(stats.won200 || 0));
      document.getElementById('stats').innerHTML = `
        ${[
          ['🎫 已啟動', stats.total],
          ['💰 完成 3 關', stats.completed3],
          ['🏆 完成 7 關', stats.completed7],
          ['🧳 大獎中籤', stats.won200]
        ].map(([k, v]) => `
          <div class="bg-white/10 backdrop-blur rounded-2xl p-4 text-center border border-white/20">
            <p class="text-xs opacity-80">${k}</p>
            <p class="stats-card-value text-4xl font-black mt-1 drop-shadow">${v}</p>
          </div>
        `).join('')}
      `;
    }

    const log = await call('lotteryLog');
    if (log.ok && log.rows && log.rows.length > 0) {
      const last = log.rows[log.rows.length - 1];
      const roundKey = String(last.round || '') + '|' + String(last.at || '');
      const roundCount = log.rows.length;

      // 觸發條件：
      // ① 抽獎時間在「最近 5 分鐘」內 AND
      // ② 此 roundKey 還沒演過儀式（localStorage 持久化）
      // → 就算頁面剛開、剛抽完馬上開螢幕也會看到
      let drawnAtMs = 0;
      try { drawnAtMs = new Date(last.at).getTime(); } catch (e) {}
      const isRecent = drawnAtMs > 0 && (Date.now() - drawnAtMs) < 5 * 60 * 1000;
      const notShown = !ceremonyAlreadyShown(roundKey);
      lastSeenRoundKey = roundKey;
      lastSeenRoundCount = roundCount;
      if (isRecent && notShown) {
        markCeremonyShown(roundKey);
        await playCeremony();
      }

      document.getElementById('round-title').innerText = '🏆 ' + last.round;
      document.getElementById('round-time').innerHTML = `
        <p class="text-xl font-bold">${new Date(last.at).toLocaleString('zh-TW', { hour12: false })}</p>
        <p class="text-xs opacity-70">本輪抽出 ${last.drewCount} 位</p>
      `;
      const winners = (last.winners && last.winners.length > 0)
        ? last.winners
        : String(last.winnerUids || '').split(',').map(s => s.trim()).filter(Boolean).map(uid => ({ uid, name: '?' }));
      document.getElementById('winners').innerHTML = winners.map((w, i) => `
        <div class="winner-row bg-white/95 text-gray-900 rounded-2xl px-5 py-3 flex items-center gap-4 shadow-xl"
             style="animation-delay: ${i * 80}ms">
          <span class="text-3xl font-black w-12 text-orange-600">#${i + 1}</span>
          <span class="text-4xl sparkle">🎉</span>
          <span class="flex-1 text-2xl font-bold">${maskName(w.name)}</span>
          <span class="text-[10px] font-mono text-gray-400">${(w.uid || '').slice(-8)}</span>
          <span class="text-2xl">🏆</span>
        </div>
      `).join('');
      lastWinnerCount = winners.length;
    } else {
      // 尚未開獎：顯示動畫等候畫面（不寫「請主辦方執行」這種內部訊息）
      document.getElementById('round-title').innerText = '⏳ 等候開獎中…';
      document.getElementById('round-time').innerHTML = '';
      taglineIndex = (taglineIndex + 1) % TAGLINES.length;
      const tagline = TAGLINES[taglineIndex];
      document.getElementById('winners').innerHTML = `
        <div class="text-center py-6 relative">
          <div class="gem-emoji text-8xl mb-2 inline-block float drop-shadow-2xl">💎</div>
          <div class="absolute top-6 left-1/4 text-3xl sparkle opacity-80">✨</div>
          <div class="absolute top-14 right-1/4 text-2xl sparkle opacity-70" style="animation-delay:.5s">⭐</div>
          <div class="absolute top-24 left-1/3 text-xl sparkle opacity-60" style="animation-delay:1s">✨</div>
          <h3 class="text-3xl font-black mt-2 glow-text">大獎即將揭曉</h3>
          <p class="text-xl mt-4 opacity-95">
            目前
            <strong class="text-yellow-200 text-4xl drop-shadow inline-block mx-2 align-middle">${poolCount}</strong>
            位玩家進入大獎池
          </p>
          <p class="text-sm mt-4 italic opacity-85 transition-all">${tagline}</p>
        </div>
      `;
      lastWinnerCount = 0;
    }
    document.getElementById('updated-at').innerText = new Date().toLocaleTimeString('zh-TW');
  } catch (e) {
    console.error(e);
  }
}

refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
